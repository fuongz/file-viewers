name: Release

on:
  release:
    types: [created]

jobs:
  release-macos:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust (universal targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./desktop-app/src-tauri -> target"

      - name: Install frontend dependencies
        working-directory: desktop-app
        run: bun install

      # Detect whether Apple signing secrets are configured.
      # We do this via an env var so the secret value is never interpolated
      # directly into the shell script (avoids log exposure).
      - name: Detect Apple signing secrets
        id: signing
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            echo "enabled=true" >> $GITHUB_OUTPUT
          else
            echo "enabled=false" >> $GITHUB_OUTPUT
          fi

      # Signed + notarized build (requires Developer ID Application cert).
      - name: Build and publish .dmg (signed)
        if: steps.signing.outputs.enabled == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: desktop-app
          tagName: ${{ github.event.release.tag_name }}
          args: --bundles dmg --target universal-apple-darwin

      # Unsigned build — Gatekeeper will warn on first launch but the app works.
      - name: Build and publish .dmg (unsigned)
        if: steps.signing.outputs.enabled == 'false'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop-app
          tagName: ${{ github.event.release.tag_name }}
          args: --bundles dmg --target universal-apple-darwin

  release-linux:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./desktop-app/src-tauri -> target"

      - name: Install frontend dependencies
        working-directory: desktop-app
        run: bun install

      - name: Build and publish .deb + .AppImage
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WEBKIT_DISABLE_COMPOSITING_MODE: 1
          NO_AT_BRIDGE: 1
        with:
          projectPath: desktop-app
          tagName: ${{ github.event.release.tag_name }}
          args: --bundles deb,appimage

  release-linux-fedora:
    runs-on: ubuntu-22.04
    container: fedora:latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Fedora system dependencies
        run: |
          dnf install -y \
            git \
            curl \
            file \
            openssl-devel \
            gtk3-devel \
            webkit2gtk4.1-devel \
            libappindicator-gtk3-devel \
            librsvg2-devel \
            patchelf \
            gcc \
            make \
            unzip

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./desktop-app/src-tauri -> target"

      - name: Install frontend dependencies
        working-directory: desktop-app
        run: bun install

      - name: Build and publish .rpm
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WEBKIT_DISABLE_COMPOSITING_MODE: 1
          NO_AT_BRIDGE: 1
        with:
          projectPath: desktop-app
          tagName: ${{ github.event.release.tag_name }}
          args: --bundles rpm

  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./desktop-app/src-tauri -> target"

      - name: Install frontend dependencies
        working-directory: desktop-app
        run: bun install

      - name: Build and publish .msi + .exe
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop-app
          tagName: ${{ github.event.release.tag_name }}
          args: --bundles msi,nsis
